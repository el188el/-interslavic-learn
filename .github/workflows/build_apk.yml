# Сборка release APK без локального Android SDK (runner уже ставит Flutter + SDK через шаги ниже).
name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main, master]
    paths:
      - 'interslavic_learn/**'
      - '.github/workflows/build_apk.yml'

jobs:
  apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: interslavic_learn

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: android-actions/setup-android@v3

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            interslavic_learn/android/.gradle
          key: ${{ runner.os }}-gradle-${{ hashFiles('interslavic_learn/android/**/*.gradle.kts', 'interslavic_learn/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Import release keystore from secrets
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: interslavic_learn/android
        env:
          B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          python3 -c "import os,base64; open('upload-keystore.jks','wb').write(base64.b64decode(os.environ['B64']))"

      - name: Write key.properties from secrets
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        working-directory: interslavic_learn/android
        env:
          STORE_PW: ${{ secrets.ANDROID_STORE_PASSWORD }}
          KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          python3 << 'PY'
          import os
          from pathlib import Path
          d = Path("key.properties")
          d.write_text(
              "storePassword=" + os.environ["STORE_PW"] + "\n"
              + "keyPassword=" + os.environ["KEY_PW"] + "\n"
              + "keyAlias=" + os.environ["KEY_ALIAS"] + "\n"
              + "storeFile=../upload-keystore.jks\n",
              encoding="utf-8",
          )
          PY

      - name: Dependencies
        run: flutter pub get

      - name: Build APK (release)
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: interslavic_learn/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
