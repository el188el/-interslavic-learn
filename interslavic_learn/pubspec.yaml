name: interslavic_learn
description: "Interslavic (Medžuslovjansky) language learning app — MVP"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  # Local-first / offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Backend (sync, auth, leaderboard)
  supabase_flutter: ^2.8.4
  # Audio playback (phrases / pronunciation)
  audioplayers: ^6.1.0
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  http: ^1.2.2
  collection: ^1.19.0
  flutter_animate: ^4.5.2
  url_launcher: ^6.3.1
  google_fonts: ^6.3.3
  package_info_plus: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3
  image: ^4.5.4

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/branding/app_icon.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/app_icon_foreground.png
  min_sdk_android: 21
