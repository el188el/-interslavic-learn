name: interslavic_learn
description: "Interslavic (Medžuslovjansky) language learning app — MVP"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # Local-first / offline storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Audio playback
  audioplayers: ^6.1.0
  # Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  shared_preferences: ^2.3.4
  path_provider: ^2.1.5
  # HTTP (for sync)
  http: ^1.2.2
  # JSON serialization helpers
  json_annotation: ^4.9.0
  collection: ^1.19.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/data/
